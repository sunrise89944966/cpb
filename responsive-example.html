<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>響應式網頁設計範例</title>
    <style>
        /* --- 通用樣式 --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
        }

        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem 0;
        }

        /* --- 導覽列樣式 (電腦版) --- */
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: #444;
            display: flex; /* 使用 Flexbox 讓項目水平排列 */
            justify-content: center; /* 水平置中 */
        }

        nav ul li {
            margin: 0;
        }

        nav ul li a {
            display: block;
            padding: 15px 25px;
            color: #fff;
            text-decoration: none;
        }

        nav ul li a:hover {
            background-color: #555;
        }

        /* --- 內容區塊樣式 (電腦版) --- */
        .main-content {
            display: flex; /* 使用 Flexbox 讓左右欄並排 */
            margin-top: 20px;
        }

        .main-column {
            flex: 2; /* 主欄佔 2/3 寬度 */
            padding-right: 20px;
        }

        .sidebar-column {
            flex: 1; /* 側邊欄佔 1/3 寬度 */
            background-color: #eee;
            padding: 15px;
        }

        /* --- Media Query: 當螢幕寬度小於或等於 768px 時套用 --- */
        @media (max-width: 768px) {
            /* --- 導覽列樣式 (手機版) --- */
            nav ul {
                flex-direction: column; /* 將項目改為垂直堆疊 */
                text-align: center;
            }

            /* --- 內容區塊樣式 (手機版) --- */
            .main-content {
                flex-direction: column; /* 將左右欄改為垂直堆疊 */
            }

            .main-column {
                padding-right: 0; /* 移除右邊間距 */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>我的響應式網站</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">首頁</a></li>
            <li><a href="#">關於我們</a></li>
            <li><a href="#">服務項目</a></li>
            <li><a href="#">聯絡我們</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="main-content">
            <main class="main-column">
                <h2>主要內容</h2>
                <p>這是一些主要內容。在電腦螢幕上，我會和側邊欄並排顯示。但在手機等較小的螢幕上，側邊欄會移動到我的下方。</p>
                <p>試著縮放您的瀏覽器視窗，看看版面配置的變化！</p>
            </main>
            <aside class="sidebar-column">
                <h3>側邊欄</h3>
                <p>這是一些側邊欄內容。</p>
            </aside>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 響應式設計範例</p>
    </footer>

</body>
</html>

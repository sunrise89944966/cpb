        document.addEventListener('DOMContentLoaded', function () {
            const navLinks = document.querySelectorAll('.nav-bar a');

            const hamburger = document.querySelector('.hamburger-menu');
            const navBar = document.querySelector('.nav-bar');
            const navOverlay = document.querySelector('.nav-overlay');
            const navBackBtns = document.querySelectorAll('.nav-btn-back');

            function toggleMenu() {
                navBar.classList.toggle('is-open');
                navOverlay.classList.toggle('is-active');
            }

            // Function to handle section switching
            function showSection(targetId, clickedElement = null) {
                navLinks.forEach(l => l.classList.remove('active'));
                if (clickedElement && clickedElement.classList.contains('nav-bar-link')) {
                    clickedElement.classList.add('active');
                } else {
                    // If not a nav-bar-link, try to find the corresponding nav link to activate
                    const correspondingNavLink = document.querySelector(`.nav-bar a[href="#${targetId}"]`);
                    if (correspondingNavLink) {
                        correspondingNavLink.classList.add('active');
                    }
                }

                sections.forEach(s => s.classList.remove('active'));
                document.getElementById(targetId).classList.add('active');
                if (targetId === 'home') startHomeCarousel();
                if (navBar.classList.contains('is-open')) toggleMenu();
                window.scrollTo(0, 0);
            }

            navLinks.forEach(link => {
                link.addEventListener('click', function (e) {
                    const href = this.getAttribute('href');
                    if (!href.startsWith('#')) return; // Allow external/file links to navigate normally

                    e.preventDefault();
                    const targetId = href.substring(1);
                    showSection(targetId, this); // Pass 'this' to correctly set active class
                });
            });

            navBackBtns.forEach(btn => {
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('data-target-section') || 'home'; // Default to 'home'
                    showSection(targetId);
                });
            });

            hamburger.addEventListener('click', toggleMenu);
            navOverlay.addEventListener('click', toggleMenu);
            startHomeCarousel();
        });

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>擬真發票模擬器 SUN67 | 完美防偽大寫列</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --paper-border: #99CBCB;
            --ink-black: #333;
            --write-orange: #FF6600;
            --seal-blue: #F5F5F5;
            --panel-bg: #f8f9fa;
        }

        @font-face {
            font-family: 'InvoiceFont';
            src: local('DFKai-SB'), local('標楷體');
        }

        body {
            background-color: #e9ecef;
            font-family: "InvoiceFont", "Noto Sans TC", serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            width: 950px;
            box-sizing: border-box;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        .form-control {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #99CBCB;
            box-shadow: 0 0 5px rgba(153, 203, 203, 0.3);
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .items-table th {
            text-align: left;
            padding: 8px;
            font-size: 0.85rem;
            color: #666;
            background: #f8f9fa;
        }

        .items-table td {
            padding: 5px;
        }

        .item-row input {
            width: 100%;
            box-sizing: border-box;
        }

        /* 發票本體樣式 */
        .invoice-outer {
            width: 950px;
            box-sizing: border-box;
        }

        .invoice-paper {
            background-color: #fff;
            padding: 25px 40px;
            min-height: 500px;
            position: relative;
            color: var(--ink-black);
            line-height: 1.2;
            border: 2px solid var(--paper-border);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .header-left {
            font-size: 1.5rem;
            letter-spacing: 2px;
            width: 200px;
        }

        .header-center {
            text-align: center;
            flex: 1;
        }

        .header-center h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 6px;
            font-weight: normal;
        }

        .write-text {
            color: var(--write-orange);
            font-weight: 700;
        }

        .buyer-section {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .buyer-row {
            display: flex;
            align-items: flex-end;
            margin-bottom: 6px;
        }

        .buyer-row label {
            min-width: 90px;
            letter-spacing: 2px;
        }

        .buyer-name-input {
            border-bottom: 1px solid #000;
            flex: 1;
            padding: 0 10px;
            min-height: 25px;
        }

        .tax-id-wrap {
            display: flex;
            align-items: center;
            margin-left: 10px;
        }

        .tax-box {
            width: 35px;
            height: 30px;
            border: 1px solid #000;
            margin-right: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        /* 地址列結構重新排定 (為對齊 X5) */
        .address-row {
            display: flex;
            align-items: flex-end;
            gap: 0;
            font-size: 1rem;
            margin-top: 8px;
            border-bottom: 1px solid #000;
            padding-bottom: 1px;
        }

        .addr-val {
            text-align: center;
            display: inline-block;
            line-height: 1;
            border-bottom: 0;
        }

        .main-table {
            width: 870px;
            border-collapse: collapse;
            margin-top: 5px;
            border: 2px solid #000;
            table-layout: fixed;
        }

        .main-table th {
            border: 1px solid #000;
            padding: 2px;
            font-weight: normal;
            font-size: 1.1rem;
            letter-spacing: 4px;
            height: 28px;
            background-color: #fafafa;
        }

        .main-table td {
            border: 1px solid #000;
            padding: 2px 5px;
            height: 18px;
            font-size: 1rem;
            vertical-align: middle;
            overflow: hidden;
            word-break: break-all;
        }

        .stat-lbl-center {
            text-align: center;
            letter-spacing: 5px;
            font-size: 1.05rem;
            padding: 2px 0;
            background-color: #fafafa;
        }

        .text-left {
            text-align: left;
            padding-left: 10px !important;
        }

        .text-right {
            text-align: right;
            padding-right: 15px !important;
        }

        .seal-title {
            font-size: 0.8rem !important;
            text-align: center !important;
            letter-spacing: 1px !important;
            height: 25px !important;
            padding: 0 !important;
            background-color: #fafafa;
            border: 1px solid #000 !important; 
            vertical-align: middle;
        }

        .seal-cell {
            text-align: center;
            vertical-align: middle;
            background-color: #fff;
            padding: 0;
            position: relative;
            border: 1px solid #000; 
        }

        .seal-oval {
            width: 140px; 
            height: 95px; 
            background-color: var(--seal-blue);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #117777;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            opacity: 0.6;
            margin: 2px;
            border: 3px dashed #117777;
        }

        .tax-options {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100%;
            padding: 0 5px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }

        .v-box {
            display: inline-block;
            border: 1px solid #000;
            width: 14px;
            height: 14px;
            line-height: 12px;
            text-align: center;
            font-size: 12px;
        }

        /* 大寫列內部排版容器 (SUN66) */
        .chinese-row-wrap {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0 8px;
            width: 100%;
            box-sizing: border-box;
            background-color: #fff;
        }
        
        .chinese-label-left {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-align: left;
            line-height: 1.2;
            margin-right: 30px;
        }

        .chinese-amt-box {
            display: flex;
            flex: 1;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 10px;
        }
        
        .c-unit-group {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .c-unit-label {
            font-size: 0.95rem;
            color: #333;
        }

        .c-val-text {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--write-orange);
            display: inline-block;
            width: 18px; /* 保證字體所佔空間一致 */
            text-align: center;
        }
        
        /* SUN67: 新增淺灰色防偽零字的類別 */
        .c-val-zero {
            color: #ccc !important;
            font-weight: normal !important;
        }

        .bottom-tag {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.8rem;
        }

        @media print {
            .control-panel, .back-link, button { display: none !important; }
            body { padding: 0; background: #fff; }
            .invoice-paper { box-shadow: none; border: 2px solid var(--paper-border); padding: 15px 30px; }
        }
    </style>
</head>

        <a href="SUN50.html" class="back-link" style="color: #666; text-decoration: none;">← 返回主站 </a>

    <!-- 專業控制面版 -->

        <div class="form-grid">

            <div class="form-group">

            </div>
            <div class="form-group">
                <label>開立日期</label>

            </div>
        </div>

        <table class="items-table">
            <thead>
                <tr>
                    <th style="width: 45%;">品名項目</th>
                    <th style="width: 15%;">數量</th>
                    <th style="width: 20%;" id="price-label">單價 (未稅)</th>
                    <th style="width: 20%;">金額</th>
                </tr>
            </thead>
            <tbody id="items-tbody">
                <tr class="item-row">
                    <td><input type="text" class="form-control it-name" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-qty" placeholder="1" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-price" oninput="updateUI()"></td>
                    <td><input type="text" class="form-control it-sum" readonly style="background: #f1f3f5;"></td>
                </tr>
                <tr class="item-row">
                    <td><input type="text" class="form-control it-name" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-qty" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-price" oninput="updateUI()"></td>
                    <td><input type="text" class="form-control it-sum" readonly style="background: #f1f3f5;"></td>
                </tr>
                <tr class="item-row">
                    <td><input type="text" class="form-control it-name" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-qty" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-price" oninput="updateUI()"></td>
                    <td><input type="text" class="form-control it-sum" readonly style="background: #f1f3f5;"></td>
                </tr>
                <tr class="item-row">
                    <td><input type="text" class="form-control it-name" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-qty" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-price" oninput="updateUI()"></td>
                    <td><input type="text" class="form-control it-sum" readonly style="background: #f1f3f5;"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 發票主體 -->
    <div class="invoice-outer">
        <div class="invoice-paper">
            <div class="header">
                <!-- 更新發票號碼為 AB 51685168 -->
                <div class="header-left">AB 51685168</div>
                <div class="header-center">
                    <h1 id="inv-title">統 一 發 票 (三聯式)</h1>
                    <div style="margin-top:6px; font-size:1.1rem;">
                        <span id="v-yr" class="write-text"></span> 年 <span id="v-mth-range" class="write-text"></span> 月 份
                    </div>
                    <div style="margin-top:4px;">中 華 民 國 <span id="h-y" class="write-text"></span> 年 <span id="h-m" class="write-text"></span> 月 <span id="h-d" class="write-text"></span> 日</div>
                </div>
                <div style="width: 200px; text-align: right; color: #ccc; font-size: 0.8rem;">日盛國際聯合稅務</div>
            </div>

            <div class="buyer-section">
                <div class="buyer-row" style="margin-bottom: 4px;">
                    <label style="letter-spacing: 12px;">買受人：</label>
                    <div class="buyer-name-input write-text" id="v-buyer"></div>
                </div>
                <div class="buyer-row" id="v-taxid-row" style="margin-bottom: 4px;">
                    <label style="letter-spacing: 2px;">統一編號：</label>
                    <div class="tax-id-wrap" id="taxid-boxes">
                        <div class="tax-box write-text"></div>
                        <div class="tax-box write-text"></div>
                        <div class="tax-box write-text"></div>
                        <div class="tax-box write-text"></div>
                        <div class="tax-box write-text"></div>
                        <div class="tax-box write-text"></div>
                        <div class="tax-box write-text"></div>
                        <div class="tax-box write-text"></div>
                    </div>
                </div>
                <!-- 調整地址間距，設定固定寬度迫使 "路街" 對齊 X5 (約距離左側 150px-160px) -->
                <div class="address-row">
                    <span style="letter-spacing: 12px; min-width: 80px;">地址：</span>
                    <span class="addr-val write-text" style="width: 50px;"></span> 縣市
                    <span class="addr-val write-text" style="width: 70px;"></span> 鄉鎮市區
                    <span class="addr-val write-text" style="width: 140px;"></span> 路街 <!-- 前方佔用約 80+50+50+70+60=310px，扣除字體本身，路街大約在 X5~X6 之間 -->
                    <span class="addr-val write-text" style="width: 40px;"></span> 段
                    <span class="addr-val write-text" style="width: 40px;"></span> 巷
                    <span class="addr-val write-text" style="width: 40px;"></span> 弄
                    <span class="addr-val write-text" style="width: 45px;"></span> 號
                    <span class="addr-val write-text" style="width: 40px;"></span> 樓
                    <span class="addr-val write-text" style="width: 35px;"></span> 室
                </div>
            </div>

            <table class="main-table">
                <colgroup>
                    <col style="width: 250px;">
                    <col style="width: 60px;">
                    <col style="width: 140px;">
                    <col style="width: 142px;">
                    <col style="width: 278px;">
                </colgroup>
                <thead>
                    <tr>
                        <th style="padding: 0;">
                            <div style="display: flex; height: 100%;">
                                <div style="flex: 1; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center;">品</div>
                                <div style="flex: 1; display: flex; align-items: center; justify-content: center;">名</div>
                            </div>
                        </th>
                        <th>數 量</th>
                        <th>單 價</th>
                        <th>金 額</th>
                        <th style="display: flex; justify-content: space-between; padding: 2px 15px; border: 0;">
                            <span>備</span>
                            <span>註</span>
                        </th>
                    </tr>
                </thead>
                <!-- 全新整合的單一 tbody -->
                <tbody id="v-main-tbody">
                    <!-- 明細列 1: 備註對應左側 2 格 -->
                    <tr>
                        <td class="write-text text-left"></td>
                        <td class="write-text text-right"></td>
                        <td class="write-text text-right"></td>
                        <td class="write-text text-right"></td>
                        <td rowspan="2" style="vertical-align: top; padding: 5px;"></td> <!-- 瘦身至 2 列表高 -->
                    </tr>
                    <!-- 明細列 2 -->
                    <tr>
                        <td class="text-left write-text"></td>
                        <td class="text-right write-text"></td>
                        <td class="text-right write-text"></td>
                        <td class="text-right write-text"></td>
                    </tr>
                    <!-- 明細列 3: 蓋章區標題提前出現 -->
                    <tr>
                        <td class="text-left write-text"></td>
                        <td class="text-right write-text"></td>
                        <td class="text-right write-text"></td>
                        <td class="text-right write-text"></td>
                        <td class="seal-title">營業人蓋用統一發票專用章</td> <!-- 第 3 列就是獨立格子 -->
                    </tr>
                    <!-- 明細列 4: 蓋章格提前開始，並無縫連接到底部合計列 -->
                    <tr>
                        <td class="text-left write-text"></td>
                        <td class="text-right write-text"></td>
                        <td class="text-right write-text"></td>
                        <td class="text-right write-text"></td>
                        <td id="the-seal-cell" class="seal-cell" rowspan="5"> <!-- 動態分配: 三聯 5 格，二聯 4 格 -->
                            <div class="seal-oval">這裡蓋發票章</div>
                        </td>
                    </tr>

                    <!-- ==== 三聯式底部 (4 列) ==== -->
                    <tr class="row-3-part">
                        <td colspan="3" class="stat-lbl-center">銷 售 額 合 計</td>
                        <td id="v-sales-3" class="write-text text-right"></td>
                    </tr>
                    <tr class="row-3-part">
                        <td class="stat-lbl-center">營 業 稅</td>
                        <td colspan="2" style="padding: 0;">
                            <div class="tax-options">
                                <div class="opt">應 稅 <span id="v3-tax-v" class="v-box write-text">V</span></div>
                                <div class="opt">零稅率 <span class="v-box"></span></div>
                                <div class="opt">免 稅 <span class="v-box"></span></div>
                            </div>
                        </td>
                        <td id="v-tax-3" class="write-text text-right"></td>
                    </tr>
                    <tr class="row-3-part">
                        <td colspan="3" class="stat-lbl-center" style="padding: 0;">
                            <div style="display: flex; justify-content: space-between; padding: 2px 60px;">
                                <span>總</span>
                                <span>計</span>
                            </div>
                        </td>
                        <td id="v-total-3" class="write-text text-right"></td>
                    </tr>
                    <tr class="row-3-part">
                        <!-- 去除直線、靠左對齊、加上中文單位標籤 (三聯式) -->
                        <td colspan="4" style="padding: 0;">
                            <div class="chinese-row-wrap">
                                <div class="chinese-label-left">總計新臺幣<br>(中文大寫)</div>
                                <div id="v-chinese-3" class="chinese-amt-box"></div>
                            </div>
                        </td>
                    </tr>

                    <!-- ==== 二聯式底部 (3 列) ==== -->
                    <tr class="row-2-part" style="display: none;">
                        <td colspan="3" class="stat-lbl-center" style="padding: 0;">
                            <div style="display: flex; justify-content: space-between; padding: 2px 60px;">
                                <span>總</span>
                                <span>計</span>
                            </div>
                        </td>
                        <td id="v-total-2" class="write-text text-right"></td>
                    </tr>
                    <tr class="row-2-part" style="display: none;">
                        <!-- 去除直線、靠左對齊、加上中文單位標籤 (二聯式) -->
                        <td colspan="4" style="padding: 0;">
                            <div class="chinese-row-wrap">
                                <div class="chinese-label-left">總計新臺幣<br>(中文大寫)</div>
                                <div id="v-chinese-2" class="chinese-amt-box"></div>
                            </div>
                        </td>
                    </tr>
                    <tr class="row-2-part" style="display: none;">
                        <td class="stat-lbl-center">課 稅 別</td>
                        <td colspan="3" style="padding: 0;">
                            <div class="tax-options">
                                <div class="opt">應 稅 <span id="v2-tax-v" class="v-box write-text"></span></div>
                                <div class="opt">零稅率 <span class="v-box"></span></div>
                                <div class="opt">免 稅 <span class="v-box"></span></div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="bottom-tag">
                <div style="font-size: 0.65rem; color: #333; transform: scale(0.9); transform-origin: left;">
                    ※應稅、零稅率、免稅之銷售額應分別開立統一發票，並應於各該欄打「V」。
                </div>
                <div style="font-weight: bold; font-size: 0.95rem; letter-spacing: 4px;">第一聯 存根聯</div>
            </div>
        </div>
    </div>

    <button style="margin: 30px; padding: 12px 40px; background: #333; color: #fff; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 4px;" onclick="window.print()">點此列印 / 另存為 PDF</button>

    <script>
        const now = new Date();
        document.getElementById('in-date').valueAsDate = now;

        function clearForm() {
            document.querySelectorAll('.form-control').forEach(el => {
                if (el.id !== 'invType' && el.id !== 'in-date') el.value = '';
            });
            updateUI();
        }

        // 修改中文大寫生成邏輯：加入淺灰色預設「零」字 (SUN67)
        function generateChineseHTML(num) {
            const digits = "零壹貳參肆伍陸柒捌玖";
            const units = ['億', '仟', '佰', '拾', '萬', '仟', '佰', '拾', '元'];
            let html = '';
            
            // 安全處理未填或為 0 的狀態
            const safeNum = Math.round(Number(num) || 0);
            
            if (safeNum <= 0) {
                // 如果是金額為 0，全部顯示淺灰色的「零」
                units.forEach(u => {
                    html += `<div class="c-unit-group"><span class="c-val-text c-val-zero">零</span><span class="c-unit-label">${u}</span></div>`;
                });
            } else {
                // 有實際數字時，找出真正需要顯示橘色數字的高位起始點
                const s = safeNum.toString().padStart(9, '0');
                let firstNonZero = -1;
                for(let i=0; i<9; i++) {
                    if(s[i] !== '0') {
                        firstNonZero = i; 
                        break;
                    }
                }

                units.forEach((u, i) => {
                    if (firstNonZero === -1 || i < firstNonZero) {
                        // 這個位數在有效數字之前 (例如只需要萬，前面的億、仟萬就維持淺灰色零)
                        html += `<div class="c-unit-group"><span class="c-val-text c-val-zero">零</span><span class="c-unit-label">${u}</span></div>`;
                    } else {
                        // 有效數字區間：將數字轉為大寫，這時字體會呈現橘紅色 (因為拿掉了 c-val-zero)
                        const digitChar = s[i] === '0' ? '零' : digits[parseInt(s[i])];
                        html += `<div class="c-unit-group"><span class="c-val-text">${digitChar}</span><span class="c-unit-label">${u}</span></div>`;
                    }
                });
            }
            return html;
        }

        function updateUI() {
            const type = document.getElementById('invType').value;
            const buyer = document.getElementById('in-buyer').value;
            const taxid = document.getElementById('in-taxid').value;
            const dateVal = document.getElementById('in-date').value;

            const d = dateVal ? new Date(dateVal) : new Date();
            const twYear = d.getFullYear() - 1911;
            const month = d.getMonth() + 1;
            const day = d.getDate();
            const monthRange = month % 2 === 0 ? `${month - 1}、${month}` : `${month}、${month + 1}`;

            document.getElementById('v-yr').innerText = twYear;
            document.getElementById('v-mth-range').innerText = monthRange;
            document.getElementById('h-y').innerText = twYear;
            document.getElementById('h-m').innerText = month;
            document.getElementById('h-d').innerText = day;

            const nameInputs = document.querySelectorAll('.it-name');
            const qtyInputs = document.querySelectorAll('.it-qty');
            const priceInputs = document.querySelectorAll('.it-price');
            const sumInputs = document.querySelectorAll('.it-sum');

            const vRows = document.getElementById('v-main-tbody').rows;
            let totalAmt = 0;

            document.getElementById('price-label').innerText = (type === '3') ? "單價 (未稅)" : "單價 (含稅)";

            for (let i = 0; i < 4; i++) {
                const name = nameInputs[i].value;
                const qty = parseFloat(qtyInputs[i].value) || 0;
                const price = parseFloat(priceInputs[i].value) || 0;
                let sum = (qty > 0 && price > 0) ? qty * price : 0;
                sumInputs[i].value = sum > 0 ? sum.toLocaleString() : '';
                totalAmt += sum;

                vRows[i].cells[0].innerText = name;
                vRows[i].cells[1].innerText = qty > 0 ? qty : '';
                vRows[i].cells[2].innerText = price > 0 ? price.toLocaleString() : '';
                vRows[i].cells[3].innerText = sum > 0 ? sum.toLocaleString() : '';
            }

            let sales = 0, tax = 0, total = 0;
            
            const sealCell = document.getElementById('the-seal-cell');
            const row3s = document.querySelectorAll('.row-3-part');
            const row2s = document.querySelectorAll('.row-2-part');
            
            const taxV3 = document.getElementById('v3-tax-v');
            const taxV2 = document.getElementById('v2-tax-v');

            if (type === '3') {
                sales = Math.round(totalAmt);
                tax = Math.round(sales * 0.05);
                total = sales + tax;

                document.getElementById('inv-title').innerText = '統 一 發 票 (三聯式)';
                document.getElementById('v-taxid-row').style.display = 'flex';
                document.getElementById('taxid-grp').style.display = 'flex';

                row3s.forEach(r => r.style.display = 'table-row');
                row2s.forEach(r => r.style.display = 'none');
                
                taxV3.innerText = 'V'; 

                sealCell.rowSpan = 5;

                document.getElementById('v-sales-3').innerText = sales > 0 ? sales.toLocaleString() : '';
                document.getElementById('v-tax-3').innerText = tax > 0 ? tax.toLocaleString() : '';
                document.getElementById('v-total-3').innerText = total > 0 ? total.toLocaleString() : '';
                
                // 動態呼叫防偽大寫字元函數
                document.getElementById('v-chinese-3').innerHTML = generateChineseHTML(total);
            } else {
                total = Math.round(totalAmt);
                sales = Math.round(total / 1.05);
                tax = total - sales;

                document.getElementById('inv-title').innerText = '統 一 發 票 (二聯式)';
                document.getElementById('v-taxid-row').style.display = 'none';
                document.getElementById('taxid-grp').style.display = 'none';

                row3s.forEach(r => r.style.display = 'none');
                row2s.forEach(r => r.style.display = 'table-row');
                
                taxV2.innerText = ''; 
                
                sealCell.rowSpan = 4;

                document.getElementById('v-total-2').innerText = total > 0 ? total.toLocaleString() : '';
                
                // 動態呼叫防偽大寫字元函數
                document.getElementById('v-chinese-2').innerHTML = generateChineseHTML(total);
            }

            document.getElementById('v-buyer').innerText = buyer;
            const boxes = document.querySelectorAll('#taxid-boxes .tax-box');
            boxes.forEach((b, i) => b.innerText = (type === '3' ? (taxid[i] || '') : ''));
        }

        // 初始化時，保證即使未填寫數字，大寫單位與前面的淺灰色零都會出現
        updateUI();
    </script>
</body>

</html>

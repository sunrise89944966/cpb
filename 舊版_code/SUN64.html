<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>擬真發票模擬器 SUN64 | 完美比例終極版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --paper-border: #99CBCB;
            --ink-black: #333;
            --write-orange: #FF6600;
            --seal-blue: #F5F5F5;
            --panel-bg: #f8f9fa;
        }

        @font-face {
            font-family: 'InvoiceFont';
            src: local('DFKai-SB'), local('標楷體');
        }

        body {
            background-color: #e9ecef;
            font-family: "InvoiceFont", "Noto Sans TC", serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            width: 950px;
            box-sizing: border-box;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        .form-control {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #99CBCB;
            box-shadow: 0 0 5px rgba(153, 203, 203, 0.3);
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .items-table th {
            text-align: left;
            padding: 8px;
            font-size: 0.85rem;
            color: #666;
            background: #f8f9fa;
        }

        .items-table td {
            padding: 5px;
        }

        .item-row input {
            width: 100%;
            box-sizing: border-box;
        }

        /* 發票本體樣式 */
        .invoice-outer {
            width: 950px;
            box-sizing: border-box;
        }

        .invoice-paper {
            background-color: #fff;
            padding: 25px 40px;
            min-height: 500px;
            position: relative;
            color: var(--ink-black);
            line-height: 1.2;
            border: 2px solid var(--paper-border);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .header-left {
            font-size: 1.5rem;
            letter-spacing: 2px;
            width: 200px;
        }

        .header-center {
            text-align: center;
            flex: 1;
        }

        .header-center h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 6px;
            font-weight: normal;
        }

        .write-text {
            color: var(--write-orange);
            font-weight: 700;
        }

        .buyer-section {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .buyer-row {
            display: flex;
            align-items: flex-end;
            margin-bottom: 6px;
        }

        .buyer-row label {
            min-width: 90px;
            letter-spacing: 2px;
        }

        .buyer-name-input {
            border-bottom: 1px solid #000;
            flex: 1;
            padding: 0 10px;
            min-height: 25px;
        }

        .tax-id-wrap {
            display: flex;
            align-items: center;
            margin-left: 10px;
        }

        .tax-box {
            width: 35px;
            height: 30px;
            border: 1px solid #000;
            margin-right: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .address-row {
            display: flex;
            align-items: flex-end;
            gap: 0;
            font-size: 1rem;
            margin-top: 8px;
            border-bottom: 1px solid #000;
            padding-bottom: 1px;
        }

        .addr-val {
            min-width: 20px;
            text-align: center;
            display: inline-block;
            line-height: 1;
            margin: 0 2px;
            border-bottom: 0;
        }

        .main-table {
            width: 870px;
            border-collapse: collapse;
            margin-top: 5px;
            border: 2px solid #000;
            table-layout: fixed;
        }

        .main-table th {
            border: 1px solid #000;
            padding: 2px;
            font-weight: normal;
            font-size: 1.1rem;
            letter-spacing: 4px;
            height: 28px;
            background-color: #fafafa;
        }

        .main-table td {
            border: 1px solid #000;
            padding: 2px 5px;
            height: 18px;
            font-size: 1rem;
            vertical-align: middle;
            overflow: hidden;
            word-break: break-all;
        }

        .stat-lbl-center {
            text-align: center;
            letter-spacing: 5px;
            font-size: 1.05rem;
            padding: 2px 0;
            background-color: #fafafa;
        }

        .text-left {
            text-align: left;
            padding-left: 10px !important;
        }

        .text-right {
            text-align: right;
            padding-right: 15px !important;
        }

        /* 標題格位強化：確保它是一個封閉且明顯的格子 */
        .seal-title {
            font-size: 0.8rem !important;
            text-align: center !important;
            letter-spacing: 1px !important;
            height: 25px !important;
            padding: 0 !important;
            background-color: #fafafa;
            border: 1px solid #000 !important;
            /* 強制四邊格子化 */
            vertical-align: middle;
        }

        .seal-cell {
            text-align: center;
            vertical-align: middle;
            background-color: #fff;
            padding: 0;
            position: relative;
            border: 1px solid #000;
            /* 與上方格子完美接合 */
        }

        .seal-oval {
            width: 140px;
            /* 從 120px 放大 */
            height: 95px;
            /* 從 85px 放大 */
            background-color: var(--seal-blue);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #117777;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            opacity: 0.6;
            margin: 2px;
            border: 3px dashed #117777;
        }

        .tax-options {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100%;
            padding: 0 5px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }

        .v-box {
            display: inline-block;
            border: 1px solid #000;
            width: 14px;
            height: 14px;
            line-height: 12px;
            text-align: center;
            font-size: 12px;
        }

        .c-table {
            width: 315px;
            height: 30px;
            border-collapse: collapse;
            table-layout: fixed;
            margin: 0 auto;
        }

        .c-table td {
            border: 0;
            border-right: 1px solid #000;
            padding: 0;
            text-align: center;
            width: 35px;
            height: 30px;
        }

        .c-table td:last-child {
            border-right: 0;
        }

        .c-unit-label {
            font-size: 0.65rem;
            display: block;
            margin-top: -4px;
            line-height: 1;
        }

        .c-val-text {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--write-orange);
            display: block;
            line-height: 1;
        }

        .bottom-tag {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.8rem;
        }

        @media print {

            .control-panel,
            .back-link,
            button {
                display: none !important;
            }

            body {
                padding: 0;
                background: #fff;
            }

            .invoice-paper {
                box-shadow: none;
                border: 2px solid var(--paper-border);
                padding: 15px 30px;
            }
        }
    </style>
</head>

                <tr class="item-row">
                    <td><input type="text" class="form-control it-name" oninput="updateUI()"></td>

                    <td><input type="number" class="form-control it-price" oninput="updateUI()"></td>
                    <td><input type="text" class="form-control it-sum" readonly style="background: #f1f3f5;"></td>
                </tr>
                <tr class="item-row">
                    <td><input type="text" class="form-control it-name" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-qty" oninput="updateUI()"></td>
                    <td><input type="number" class="form-control it-price" oninput="updateUI()"></td>

                <tr class="item-row">

    <button

    <script>
        const now = new Date();
        document.getElementById('in-date').valueAsDate = now;

        function clearForm() {
            document.querySelectorAll('.form-control').forEach(el => {
                if (el.id !== 'invType' && el.id !== 'in-date') el.value = '';
            });
            updateUI();
        }

        function generateChineseHTML(num) {
            const digits = "零壹貳參肆伍陸柒捌玖";
            const s = Math.floor(num).toString().padStart(9, '0');
            const units = ['億', '仟', '佰', '拾', '萬', '仟', '佰', '拾', '元'];
            let html = '<table class="c-table"><tr>';
            units.forEach((u, i) => {
                html += `<td><span class="c-val-text">${digits[parseInt(s[i])]}</span><span class="c-unit-label">${u}</span></td>`;
            });
            html += '</tr></table>';
            return html;
        }

        function updateUI() {
            const type = document.getElementById('invType').value;
            const buyer = document.getElementById('in-buyer').value;
            const taxid = document.getElementById('in-taxid').value;
            const dateVal = document.getElementById('in-date').value;

            const d = dateVal ? new Date(dateVal) : new Date();
            const twYear = d.getFullYear() - 1911;
            const month = d.getMonth() + 1;
            const day = d.getDate();
            const monthRange = month % 2 === 0 ? `${month - 1}、${month}` : `${month}、${month + 1}`;

            document.getElementById('v-yr').innerText = twYear;
            document.getElementById('v-mth-range').innerText = monthRange;
            document.getElementById('h-y').innerText = twYear;
            document.getElementById('h-m').innerText = month;
            document.getElementById('h-d').innerText = day;

            const nameInputs = document.querySelectorAll('.it-name');
            const qtyInputs = document.querySelectorAll('.it-qty');
            const priceInputs = document.querySelectorAll('.it-price');
            const sumInputs = document.querySelectorAll('.it-sum');

            // 抓取全域 tbody 的列
            const vRows = document.getElementById('v-main-tbody').rows;
            let totalAmt = 0;

            document.getElementById('price-label').innerText = (type === '3') ? "單價 (未稅)" : "單價 (含稅)";

            // 0 到 3 剛好對應商品明細的 4 列 (因為前面沒有其他列干擾)
            for (let i = 0; i < 4; i++) {
                const name = nameInputs[i].value;
                const qty = parseFloat(qtyInputs[i].value) || 0;
                const price = parseFloat(priceInputs[i].value) || 0;
                let sum = (qty > 0 && price > 0) ? qty * price : 0;
                sumInputs[i].value = sum > 0 ? sum.toLocaleString() : '';
                totalAmt += sum;

                vRows[i].cells[0].innerText = name;
                vRows[i].cells[1].innerText = qty > 0 ? qty : '';
                vRows[i].cells[2].innerText = price > 0 ? price.toLocaleString() : '';
                vRows[i].cells[3].innerText = sum > 0 ? sum.toLocaleString() : '';
            }

            let sales = 0, tax = 0, total = 0;

            const sealCell = document.getElementById('the-seal-cell');
            const row3s = document.querySelectorAll('.row-3-part');
            const row2s = document.querySelectorAll('.row-2-part');

            if (type === '3') {
                sales = Math.round(totalAmt);
                tax = Math.round(sales * 0.05);
                total = sales + tax;

                document.getElementById('inv-title').innerText = '統 一 發 票 (三聯式)';
                document.getElementById('v-taxid-row').style.display = 'flex';
                document.getElementById('taxid-grp').style.display = 'flex';

                row3s.forEach(r => r.style.display = 'table-row');
                row2s.forEach(r => r.style.display = 'none');

                // 動態延展：三聯式涵蓋 1 項商品 + 4 個底部合計列
                sealCell.rowSpan = 5;

                document.getElementById('v-sales-3').innerText = sales > 0 ? sales.toLocaleString() : '';
                document.getElementById('v-tax-3').innerText = tax > 0 ? tax.toLocaleString() : '';
                document.getElementById('v-total-3').innerText = total > 0 ? total.toLocaleString() : '';
                document.getElementById('v-chinese-3').innerHTML = total > 0 ? generateChineseHTML(total) : '';
            } else {
                total = Math.round(totalAmt);
                sales = Math.round(total / 1.05);
                tax = total - sales;

                document.getElementById('inv-title').innerText = '統 一 發 票 (二聯式)';
                document.getElementById('v-taxid-row').style.display = 'none';
                document.getElementById('taxid-grp').style.display = 'none';

                row3s.forEach(r => r.style.display = 'none');
                row2s.forEach(r => r.style.display = 'table-row');

                // 動態延展：二聯式涵蓋 1 項商品 + 3 個底部合計列
                sealCell.rowSpan = 4;

                document.getElementById('v-total-2').innerText = total > 0 ? total.toLocaleString() : '';
                document.getElementById('v-chinese-2').innerHTML = total > 0 ? generateChineseHTML(total) : '';
            }

            document.getElementById('v-buyer').innerText = buyer;
            const boxes = document.querySelectorAll('#taxid-boxes .tax-box');
            boxes.forEach((b, i) => b.innerText = (type === '3' ? (taxid[i] || '') : ''));
        }

        updateUI();
    </script>
</body>

</html>
